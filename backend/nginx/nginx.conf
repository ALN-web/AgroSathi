worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Upstream Node.js API Gateway
    upstream api_gateway {
        server gateway:8000;
        keepalive 32;
    }

    # Upstream Python AI Crop Prediction Service
    upstream ai_crop_prediction {
        server ai-crop-prediction:8080;
        keepalive 16;
    }

    # Upstream Python AI Soil Analysis Service
    upstream ai_soil_analysis {
        server ai-soil-analysis:8081;
        keepalive 16;
    }

    # Rate limit zone definition
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    server {
        listen 80;
        server_name localhost;

        # Hardened Enterprise Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Route AI Crop Prediction requests directly to Python Engine
        location /api/v1/ai/crop-prediction/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://ai_crop_prediction/api/v1/crop-prediction/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-Id $http_x_request_id;
        }

        # Route AI Soil Analysis requests directly to Python Engine
        location /api/v1/ai/soil-analysis/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://ai_soil_analysis/api/v1/soil-analysis/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route all other /api/v1 requests to Express API Gateway
        location /api/v1/ {
            limit_req zone=api_limit burst=25 nodelay;
            proxy_pass http://api_gateway/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-Id $http_x_request_id;
        }

        # Root Health Check
        location /health {
            return 200 '{"success":true,"message":"AgroSathi Nginx Edge Gateway Operational","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }
    }
}
